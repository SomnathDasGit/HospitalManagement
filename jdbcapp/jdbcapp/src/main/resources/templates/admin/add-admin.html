<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Admin</title>
    <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div class="header">
    <h1>Hospital Management System</h1>

</div>
<div class="header">
    <h1>Add Admin</h1>
</div>

<div th:if="${message}" class="success-message">
    <p th:text="${message}"></p>
    <p>Use thia Id and password to login</p>

</div>

<div class="form-container">
    <form th:action="@{/admin/add-admin}" th:object="${user}" method="post">

        <!--
        <div class="form-group">
            <label>Username:</label>
            <input type="text" th:field="*{username}" required />
        </div> -->

        <div class="form-group">
            <label>Set your Admin Password:</label>
            <input type="password" th:field="*{password}" required />
        </div>
        <button type="submit" class="btn">Add Admin</button>
    </form>
</div>

<p style="text-align:center; margin-top:15px;">
    Already registered?
    <a th:href="@{/login}">Login here</a>

</p>

<p style="text-align:center; margin-top:15px;">

    <a th:href="@{/logout}">logout here</a>
</p>

<div style="text-align:center; margin-top:30px;">
    <a th:href="@{/admin/dashboard}" class="btn" style="width:200px; display:inline-block;">
        Go To Dashboard
    </a>
</div>

</body>
</html>
