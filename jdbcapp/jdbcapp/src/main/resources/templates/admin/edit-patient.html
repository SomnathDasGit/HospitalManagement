<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Patient Details</title>
    <!-- Link to your external CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>

<!-- Header -->
<div class="header">
    <h1>Hospital Management System</h1>

</div>

<!-- Form Container -->
<div class="form-container">
    <h2>Edit Patient Details</h2>

    <!-- Success / Error Messages -->
    <div th:if="${successMessage}" class="success-message" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="error-message" th:text="${errorMessage}"></div>

    <form th:action="@{/admin/update-patient}" th:object="${patient}" method="post">

        <!-- Hidden ID -->
        <input type="hidden" th:field="*{id}" />

        <div class="form-group">
            <label>First Name</label>
            <input type="text" th:field="*{firstName}" required />
        </div>

        <div class="form-group">
            <label>Middle Name</label>
            <input type="text" th:field="*{middleName}" />
        </div>

        <div class="form-group">
            <label>Last Name</label>
            <input type="text" th:field="*{lastName}" required />
        </div>

        <div class="form-group">
            <label>Date of Birth</label>
            <input type="date" th:field="*{dob}" required />
        </div>

        <div class="form-group">
            <label>Address</label>
            <textarea th:field="*{address}"></textarea>
        </div>

        <div class="form-group">
            <label>State:</label>
            <select th:field="*{state}" required>
                <option value="">-- Select State --</option>

                <option value="Andhra Pradesh">Andhra Pradesh</option>
                <option value="Arunachal Pradesh">Arunachal Pradesh</option>
                <option value="Assam">Assam</option>
                <option value="Bihar">Bihar</option>
                <option value="Chhattisgarh">Chhattisgarh</option>
                <option value="Goa">Goa</option>
                <option value="Gujarat">Gujarat</option>
                <option value="Haryana">Haryana</option>
                <option value="Himachal Pradesh">Himachal Pradesh</option>
                <option value="Jharkhand">Jharkhand</option>
                <option value="Karnataka">Karnataka</option>
                <option value="Kerala">Kerala</option>
                <option value="Madhya Pradesh">Madhya Pradesh</option>
                <option value="Maharashtra">Maharashtra</option>
                <option value="Manipur">Manipur</option>
                <option value="Meghalaya">Meghalaya</option>
                <option value="Mizoram">Mizoram</option>
                <option value="Nagaland">Nagaland</option>
                <option value="Odisha">Odisha</option>
                <option value="Punjab">Punjab</option>
                <option value="Rajasthan">Rajasthan</option>
                <option value="Sikkim">Sikkim</option>
                <option value="Tamil Nadu">Tamil Nadu</option>
                <option value="Telangana">Telangana</option>
                <option value="Tripura">Tripura</option>
                <option value="Uttar Pradesh">Uttar Pradesh</option>
                <option value="Uttarakhand">Uttarakhand</option>
                <option value="West Bengal">West Bengal</option>

                <!-- Union Territories -->
                <option value="Andaman and Nicobar Islands">Andaman and Nicobar Islands</option>
                <option value="Chandigarh">Chandigarh</option>
                <option value="Dadra and Nagar Haveli and Daman and Diu">Dadra and Nagar Haveli and Daman and Diu</option>
                <option value="Delhi">Delhi</option>
                <option value="Jammu and Kashmir">Jammu and Kashmir</option>
                <option value="Ladakh">Ladakh</option>
                <option value="Lakshadweep">Lakshadweep</option>
                <option value="Puducherry">Puducherry</option>

            </select>
        </div>


        <div class="form-group">
            <label>Country</label>
            <input type="text" th:field="*{country}" />
        </div>

        <div class="form-group">
            <label>Mobile Number</label>
            <input type="text" th:field="*{mobileNumber}" />
        </div>

        <div class="form-group">
            <label>Relative Name</label>
            <input type="text" th:field="*{relativeName}" />
        </div>

        <div class="form-group">
            <label>Relative Mobile</label>
            <input type="text" th:field="*{relativeMobile}" />
        </div>

        <div class="form-group">
            <label>Illness Details</label>
            <textarea th:field="*{illnessDetails}"></textarea>
        </div>

        <div class="form-group">
            <label>Doctor's Speciality Requirement:</label>
            <select name="requirement" required>
                <option value="">-- Select Speciality --</option>
                <option value="Orthopedic">Orthopedic</option>
                <option value="Neurologist">Neurologist</option>
                <option value="Cardiologist">Cardiologist</option>
                <option value="Dermatologist">Dermatologist</option>
                <option value="Pediatrician">Pediatrician</option>
                <option value="General Physician">General Physician</option>
            </select>
        </div>


        <button type="submit" class="btn">Update Patient</button>

    </form>

    <div style="text-align:center; margin-top:30px;">
        <a th:href="@{/admin/dashboard}" class="btn" style="width:200px; display:inline-block;">
            Go To Dashboard
        </a>
    </div>
</div>

</body>
</html>
