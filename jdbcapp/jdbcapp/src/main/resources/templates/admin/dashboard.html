<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        /* Top bar styling */
        .topbar {
            width: 100%;
            background-color: #005b96;
            color: white;
            padding: 18px 30px;
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.1);
            position: fixed;
            top: 0;
            left: 0;
            font-size: 24px;
            font-weight: 700;
            user-select: none;
            z-index: 1000;
        }

        /* Push content below fixed topbar */
        .content-wrapper {
            margin-top: 120px; /* Increased spacing for heading + menu */
        }

        /* Dashboard heading */
        .dashboard-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .dashboard-header h1 {
            font-size: 32px;
            margin: 0;
            font-weight: 700;
            color: #005b96;
        }

        .dashboard-header p {
            font-size: 18px;
            margin-top: 8px;
            color: #333;
        }

        /* Container box styling */
        .menu-container {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0, 91, 150, 0.15);
        }

        /* Menu list reset */
        .menu-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        /* Menu item style */
        .menu-list li {
            margin-bottom: 15px;
        }

        /* Menu link buttons */
        .menu-list a {
            display: block;
            text-decoration: none;
            background-color: #005b96;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            transition: background-color 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 91, 150, 0.3);
        }

        /* Hover effect */
        .menu-list a:hover {
            background-color: #003f6b;
            box-shadow: 0 4px 15px rgba(0, 63, 107, 0.5);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .menu-container {
                max-width: 90%;
                padding: 20px;
            }

            .menu-list a {
                font-size: 16px;
                padding: 10px 15px;
            }

            .dashboard-header h1 {
                font-size: 24px;
            }

            .dashboard-header p {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

<div class="topbar">
    Hospital Management System
</div>

<div class="content-wrapper">
    <!-- Centered heading -->
    <div class="dashboard-header">
        <h1>Admin Dashboard</h1>
        <p>Manage Patients, Doctors, Admin Users and Book Appointments</p>
    </div>

    <div class="menu-container">
        <ul class="menu-list">

            <li><a th:href="@{/admin/add-patient}">Add Patient</a></li>
            <li><a th:href="@{/admin/search-patient}">Search Patient</a></li>
            <li><a th:href="@{/admin/upload-report}">Upload Patient Report</a></li>
            <li><a th:href="@{/admin/add-doctor}">Add Doctor</a></li>
            <li><a th:href="@{/admin/view-doctors}">View Doctors</a></li>
            <li><a th:href="@{/admin/add-admin}">Add Admin</a></li>
            <li><a th:href="@{/admin/find-doctor}">Find Doctors  & Book Appointments</a></li>

            <li><a th:href="@{/admin/download}">Download Patients Excel</a></li>

        </ul>
    </div>
</div>


<p style="text-align:center; margin-top:15px;">
     <a th:href="@{/logout}">logout</a>
</p>
</body>
</html>
