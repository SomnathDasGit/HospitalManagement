<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Medical Reports</title>
    <style>
        table { border-collapse: collapse; width: 80%; margin: 20px 0; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        th { background-color: #f2f2f2; }
        a { text-decoration: none; color: blue; }
    </style>
</head>
<body>

<h2>My Medical Reports</h2>

<!-- Display message if no reports -->
<div th:if="${#lists.isEmpty(reports)}">
    <p>No medical reports found.</p>
</div>

<!-- Display table if reports exist -->
<table th:if="${!#lists.isEmpty(reports)}">
    <thead>
    <tr>
        <th>Report Name</th>
        <th>Upload Date</th>
        <th>Download</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="report : ${reports}">
        <td th:text="${report.fileName}"></td>
        <td th:text="${report.uploadDate}"> <!-- Optional, add uploadDate in entity --> </td>
        <td>
            <a th:href="@{/patient/download/{id}(id=${report.id})}">Download</a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
