spring.application.name=HospitalManagement


spring.datasource.url=jdbc:postgresql://localhost:5432/HospitalManagement
spring.datasource.username=postgres
spring.datasource.password=199827
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


# Enable multipart file upload
spring.servlet.multipart.enabled=true

# Spring multipart limits

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


# Directory to store uploaded files (optional)
# You can also store in database instead of filesystem
file.upload-dir=uploads/

#MailService
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=yourmail@gmail.com
spring.mail.password=your-app-password

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true